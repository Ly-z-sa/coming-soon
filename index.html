<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liza Phat</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />
  <meta name="theme-color" content="#f5f0e8" /> <!-- Matches the --cream background -->

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #f5f0e8;
      --dark: #1a1710;
      --gold: #c9a84c;
      --muted: #8a8272;
    }

    html,
    body {
      height: 100%;
      background: var(--cream);
      color: var(--dark);
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    .circle {
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: rotate 40s linear infinite;
    }

    .circle::before {
      content: '';
      position: absolute;
      inset: 50px;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.08);
    }

    @keyframes rotate {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .line {
      position: fixed;
      background: rgba(201, 168, 76, 0.12);
    }

    .line-h {
      width: 100%;
      height: 1px;
      left: 0;
    }

    .line-v {
      height: 100%;
      width: 1px;
      top: 0;
    }

    .line-top {
      top: 55px;
    }

    .line-bottom {
      bottom: 55px;
    }

    .line-left {
      left: 55px;
    }

    .line-right {
      right: 55px;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .eyebrow {
      font-weight: 300;
      font-size: 0.62rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      animation: fadeUp 1.4s ease 0.2s both;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--dark);
      animation: fadeUp 1.4s ease 0.4s both;
    }

    .name em {
      font-style: italic;
      color: var(--muted);
    }

    .divider {
      width: 0;
      height: 1px;
      background: var(--gold);
      margin: 32px auto;
      animation: expand 1.2s ease 0.9s forwards;
    }

    @keyframes expand {
      to {
        width: 48px;
      }
    }

    .coming-soon {
      font-weight: 200;
      font-size: 0.72rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp 1.4s ease 1s both;
    }

    .sub {
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 10px;
      opacity: 0.7;
      animation: fadeUp 1.4s ease 1.1s both;
    }

    .socials {
      display: flex;
      gap: 18px;
      margin-top: 52px;
      animation: fadeUp 1.4s ease 1.3s both;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 50%;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(201, 168, 76, 0.12);
    }

    .social-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .social-link svg.outline {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .email-link {
      margin-top: 28px;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid rgba(201, 168, 76, 0.3);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
      animation: fadeUp 1.4s ease 1.4s both;
    }

    .email-link:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .line-top {
        top: 30px;
      }

      .line-bottom {
        bottom: 30px;
      }

      .line-left {
        left: 30px;
      }

      .line-right {
        right: 30px;
      }

      .circle {
        width: 320px;
        height: 320px;
      }

      .socials {
        gap: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="line line-h line-top"></div>
  <div class="line line-h line-bottom"></div>
  <div class="line line-v line-left"></div>
  <div class="line line-v line-right"></div>
  <div class="circle"></div>

  <div class="container">

    <p class="eyebrow">Portfolio</p>
    <h1 class="name">Liza <em>Phat</em></h1>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
    <p class="sub">Something beautiful is on its way. Stay tuned.</p>

    <div class="socials">

            d="M21.643 3.611l-18.006 6.942c-1.233.495-1.226 1.183-.226 1.491l4.624 1.442 10.697-6.751c.506-.307.969-.142.588.196l-8.669 7.824-.328 4.908c.477 0 .686-.219.954-.48l2.288-2.226 4.762 3.516c.875.482 1.507.234 1.724-.809l3.123-14.709c.319-1.275-.482-1.854-1.528-1.344z" />

    </div>

    <!-- Email -->
    <a href="mailto:contact@lizaphat.shop" class="email-link">contact@lizaphat.shop</a>

  </div>

</body>

</html>
